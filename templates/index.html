<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Tri-Modal Document Interaction System">
    <title>Document Research Assistant</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body>
    <header id="app-header">
        <div class="header-left">
            <div class="logo-icon">📄</div>
            <div>
                <h1>Document Research Assistant</h1>
                <p class="subtitle">Extract metadata & chat with scientific manuscripts</p>
            </div>
        </div>
        <div class="header-right">
            <button id="togglePanelBtn" class="btn-ghost hidden" title="Toggle Metadata Panel">
                📊 View Metadata
            </button>
            <span class="status-indicator" id="statusIndicator">
                <span class="status-dot"></span>
                <span id="statusText">Ready</span>
            </span>
        </div>
    </header>

    <main id="chat-container">
        <!-- Main Chat Area -->
        <section id="chat-area">
            <div id="messagesContainer">
                <div class="message system-message">
                    <div class="message-content">
                        Welcome! Please upload a manuscript (PDF, TXT, DOCX) to extract metadata or begin a chat.
                    </div>
                </div>
            </div>
            
            <div class="chat-input-wrapper">
                <div class="chat-input-container">
                    <button id="attachBtn" class="btn-icon" title="Attach Document">📎</button>
                    <input type="file" id="fileInput" accept=".pdf,.txt,.docx" hidden>
                    <input type="text" id="chatInput" placeholder="Type a message or trigger extraction..." autocomplete="off">
                    <button id="sendBtn" class="btn-icon send-btn" title="Send Message">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z"/></svg>
                    </button>
                </div>
                <div id="uploadStatus" class="upload-status hidden">
                    <span class="badge" id="uploadBadge">Uploading...</span>
                </div>
            </div>
        </section>

        <!-- Metadata Side Panel -->
        <section id="metadata-panel" class="panel hidden">
            <div class="panel-header">
                <h2>📊 Extraction Results</h2>
                <div class="header-actions">
                    <button id="expandAllBtn" class="btn-ghost btn-sm">Expand All</button>
                    <button id="collapseAllBtn" class="btn-ghost btn-sm">Collapse All</button>
                    <button id="closePanelBtn" class="btn-icon" title="Close Panel" style="margin-left: 10px;">×</button>
                </div>
            </div>

            <div id="resultsContainer" class="results-container">
                <div id="metadataContent" class="metadata-content">
                    <div class="summary-stats">
                        <div class="stat">
                            <span class="stat-value" id="statExtracted">0</span>
                            <span class="stat-label">Extracted</span>
                        </div>
                        <div class="stat">
                            <span class="stat-value muted" id="statNull">0</span>
                            <span class="stat-label">Missing (null)</span>
                        </div>
                        <div class="stat">
                            <span class="stat-value" id="statTotal">0</span>
                            <span class="stat-label">Total Fields</span>
                        </div>
                    </div>
                    <div id="groupsContainer"></div>
                </div>
                <div class="panel-footer" style="padding: 1rem; border-top: 1px solid var(--border);">
                    <button id="downloadBtn" class="btn-ghost w-100" title="Download JSON">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4M7 10l5 5 5-5M12 15V3"/></svg>
                        Download JSON
                    </button>
                </div>
            </div>
        </section>
    </main>

    <script>
        const attachBtn = document.getElementById('attachBtn');
        const fileInput = document.getElementById('fileInput');
        const chatInput = document.getElementById('chatInput');
        const sendBtn = document.getElementById('sendBtn');
        const messagesContainer = document.getElementById('messagesContainer');
        const uploadStatus = document.getElementById('uploadStatus');
        const uploadBadge = document.getElementById('uploadBadge');
        
        const metadataPanel = document.getElementById('metadata-panel');
        const togglePanelBtn = document.getElementById('togglePanelBtn');
        const closePanelBtn = document.getElementById('closePanelBtn');
        const groupsContainer = document.getElementById('groupsContainer');
        
        const statExtracted = document.getElementById('statExtracted');
        const statNull = document.getElementById('statNull');
        const statTotal = document.getElementById('statTotal');
        const downloadBtn = document.getElementById('downloadBtn');
        
        const statusText = document.getElementById('statusText');
        const statusIndicator = document.getElementById('statusIndicator');

        let schemaData = null;
        let extractedMetadata = null;
        let isProcessing = false;

        async function init() {
            try {
                const res = await fetch('/api/schema');
                schemaData = await res.json();
            } catch (err) {
                console.error("Failed to load schema", err);
            }
        }

        attachBtn.addEventListener('click', () => fileInput.click());

        fileInput.addEventListener('change', async function() {
            if (this.files && this.files.length) {
                const file = this.files[0];
                await uploadFile(file);
                
                // If there's no chat message, auto-trigger extraction
                if (!chatInput.value.trim()) {
                    sendMessage("Extract metadata", true);
                }
                
                this.value = ''; // Reset input
            }
        });

        async function uploadFile(file) {
            addSystemMessage(`📄 Uploading: ${file.name} (${(file.size / (1024*1024)).toFixed(2)} MB)...`);
            uploadStatus.classList.remove('hidden');
            uploadBadge.textContent = 'Uploading...';
            
            const formData = new FormData();
            formData.append('file', file);

            try {
                const res = await fetch('/api/upload', {
                    method: 'POST',
                    body: formData
                });
                const data = await res.json();
                
                if (res.ok) {
                    addSystemMessage(`✅ Document successfully processed and indexed into ${data.chunk_count} chunks.`);
                    uploadBadge.textContent = 'Ready';
                    setTimeout(() => uploadStatus.classList.add('hidden'), 2000);
                    
                    // Clear previous metadata
                    extractedMetadata = null;
                    groupsContainer.innerHTML = '';
                    updateStats();
                    metadataPanel.classList.add('hidden');
                    togglePanelBtn.classList.add('hidden');
                } else {
                    addSystemMessage(`❌ Error: ${data.error}`);
                    uploadStatus.classList.add('hidden');
                }
            } catch (err) {
                addSystemMessage(`❌ Upload failed: ${err.message}`);
                uploadStatus.classList.add('hidden');
            }
        }

        chatInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter' && !isProcessing) {
                sendMessage(chatInput.value);
            }
        });

        sendBtn.addEventListener('click', () => {
            if (!isProcessing) {
                sendMessage(chatInput.value);
            }
        });

        async function sendMessage(msg, triggerExtraction = false) {
            const text = msg.trim();
            if (!text && !triggerExtraction) return;

            if (!triggerExtraction) {
                addUserMessage(text);
                chatInput.value = '';
            }

            isProcessing = true;
            statusText.textContent = "Processing...";
            statusIndicator.classList.add("processing");
            chatInput.disabled = true;
            sendBtn.disabled = true;

            const assistantMsgElem = createAssistantMessageElem();

            try {
                const res = await fetch('/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: text, trigger_extraction: triggerExtraction })
                });

                if (!res.ok) {
                    const data = await res.json();
                    assistantMsgElem.innerHTML = `<span style="color: #ff6b6b">Error: ${data.error}</span>`;
                    scrollToBottom();
                    setReady();
                    return;
                }

                const reader = res.body.getReader();
                const decoder = new TextDecoder();
                let fullContent = "";
                let currentMode = "";

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;

                    const chunk = decoder.decode(value, { stream: true });
                    const lines = chunk.split('\n');

                    for (const line of lines) {
                        if (line.startsWith('data: ')) {
                            const dataStr = line.replace('data: ', '').trim();
                            if (dataStr === '[DONE]') {
                                continue;
                            }
                            try {
                                const dataObj = JSON.parse(dataStr);
                                if (dataObj.error) {
                                    assistantMsgElem.innerHTML += `<span style="color: #ff6b6b">Error: ${dataObj.error}</span>`;
                                    continue;
                                }
                                if (dataObj.content) {
                                    fullContent += dataObj.content;
                                    currentMode = dataObj.mode;
                                    
                                    if (currentMode === 'extraction') {
                                        assistantMsgElem.innerHTML = `<span style="color: var(--text-muted)">Extracting metadata...</span>`;
                                    } else {
                                        assistantMsgElem.innerHTML = marked.parse(fullContent);
                                    }
                                    scrollToBottom();
                                }
                            } catch (e) {
                                console.error('Parse error', e, dataStr);
                            }
                        }
                    }
                }
                
                if (currentMode === 'extraction') {
                    assistantMsgElem.innerHTML = `✅ Metadata extraction complete. <a href="#" onclick="togglePanelBtn.click(); return false;" style="color: var(--primary);">View Results</a>`;
                    try {
                        extractedMetadata = JSON.parse(fullContent);
                        renderMetadata(extractedMetadata);
                        togglePanelBtn.classList.remove('hidden');
                        if (!triggerExtraction) {
                            togglePanel();
                        } else {
                            // If auto-triggered on upload, open panel by default
                            metadataPanel.classList.remove('hidden');
                        }
                    } catch (e) {
                        assistantMsgElem.innerHTML = `<span style="color: #ff6b6b">Error parsing extraction JSON</span>`;
                    }
                } else if (currentMode === 'hybrid') {
                    // Prepend mode badge
                    assistantMsgElem.innerHTML = `<div class="mode-badge hybrid-badge">Hybrid Mode</div>` + marked.parse(fullContent);
                } else if (currentMode === 'interaction') {
                    assistantMsgElem.innerHTML = `<div class="mode-badge interaction-badge">Document Q&A</div>` + marked.parse(fullContent);
                }

            } catch (err) {
                assistantMsgElem.innerHTML = `<span style="color: #ff6b6b">Request failed: ${err.message}</span>`;
            }
            
            setReady();
        }
        
        function setReady() {
            isProcessing = false;
            statusText.textContent = "Ready";
            statusIndicator.classList.remove("processing");
            chatInput.disabled = false;
            sendBtn.disabled = false;
            chatInput.focus();
            scrollToBottom();
        }

        function addUserMessage(text) {
            const wrapper = document.createElement('div');
            wrapper.className = 'message user-message';
            const content = document.createElement('div');
            content.className = 'message-content';
            content.textContent = text;
            wrapper.appendChild(content);
            messagesContainer.appendChild(wrapper);
            scrollToBottom();
        }

        function createAssistantMessageElem() {
            const wrapper = document.createElement('div');
            wrapper.className = 'message assistant-message';
            const content = document.createElement('div');
            content.className = 'message-content typing-indicator-container';
            content.innerHTML = `<div class="typing-indicator"><span></span><span></span><span></span></div>`;
            wrapper.appendChild(content);
            messagesContainer.appendChild(wrapper);
            scrollToBottom();
            return content;
        }

        function addSystemMessage(text) {
            const wrapper = document.createElement('div');
            wrapper.className = 'message system-message';
            const content = document.createElement('div');
            content.className = 'message-content';
            content.textContent = text;
            wrapper.appendChild(content);
            messagesContainer.appendChild(wrapper);
            scrollToBottom();
        }

        function scrollToBottom() {
            messagesContainer.scrollTop = messagesContainer.scrollHeight;
        }

        // Side Panel Toggle
        togglePanelBtn.addEventListener('click', togglePanel);
        closePanelBtn.addEventListener('click', togglePanel);

        function togglePanel() {
            metadataPanel.classList.toggle('hidden');
        }

        // --- Metadata Rendering Logic ---
        function renderMetadata(data) {
            groupsContainer.innerHTML = '';
            let extractedCount = 0;
            let nullCount = 0;
            let totalCount = 0;

            if (!schemaData) return;

            for (const [groupName, schemaGroup] of Object.entries(schemaData)) {
                if (!data[groupName]) continue;
                
                const groupData = data[groupName];
                const groupElem = document.createElement('div');
                groupElem.className = 'metadata-group';

                const headerElem = document.createElement('div');
                headerElem.className = 'group-header';
                
                let groupFilled = 0;
                let groupTotal = Object.keys(schemaGroup.properties || {}).length;
                totalCount += groupTotal;

                for (const key of Object.keys(schemaGroup.properties || {})) {
                    const fieldVal = groupData[key];
                    if (fieldVal && fieldVal.value !== null) {
                        groupFilled++;
                        extractedCount++;
                    } else {
                        nullCount++;
                    }
                }

                headerElem.innerHTML = `
                    <div class="group-title">
                        <span class="chevron">▼</span>
                        ${groupName}
                    </div>
                    <div class="group-stats">
                        ${groupFilled}/${groupTotal}
                    </div>
                `;

                const fieldsContainer = document.createElement('div');
                fieldsContainer.className = 'group-fields';

                for (const [fieldKey, fieldSchema] of Object.entries(schemaGroup.properties || {})) {
                    const fieldData = groupData[fieldKey];
                    
                    const fieldElem = document.createElement('div');
                    fieldElem.className = 'field-row';
                    
                    const nameElem = document.createElement('div');
                    nameElem.className = 'field-name';
                    nameElem.textContent = fieldKey;
                    nameElem.title = fieldSchema.description || "";
                    
                    const valElem = document.createElement('div');
                    valElem.className = 'field-value';
                    
                    if (!fieldData || fieldData.value === null) {
                        valElem.classList.add('null-value');
                        valElem.textContent = 'null';
                    } else {
                        valElem.textContent = typeof fieldData.value === 'object' ? JSON.stringify(fieldData.value) : fieldData.value;
                        
                        if (fieldData.confidence) {
                            const confBadge = document.createElement('span');
                            confBadge.className = 'confidence-badge';
                            confBadge.textContent = fieldData.confidence;
                            
                            const cLower = fieldData.confidence.toLowerCase();
                            if (cLower === 'high') confBadge.classList.add('conf-high');
                            else if (cLower === 'medium') confBadge.classList.add('conf-med');
                            else confBadge.classList.add('conf-low');
                            
                            valElem.appendChild(confBadge);
                        }
                        
                        if (fieldData.evidence) {
                            const evButton = document.createElement('button');
                            evButton.className = 'btn-ghost btn-sm evidence-toggle';
                            evButton.innerHTML = '🔍';
                            evButton.title = 'View evidence';
                            
                            const evPanel = document.createElement('div');
                            evPanel.className = 'evidence-panel hidden';
                            evPanel.innerHTML = `<strong>Evidence:</strong> "${fieldData.evidence}"<br>
                                                 <small>Section: ${fieldData.section || 'Unknown'} | Type: ${fieldData.inference_type || 'Unknown'}</small>`;
                            
                            evButton.onclick = () => evPanel.classList.toggle('hidden');
                            
                            const wrap = document.createElement('div');
                            wrap.style.display = 'inline-flex';
                            wrap.style.flexDirection = 'column';
                            wrap.appendChild(valElem.cloneNode(true));
                            const flexRow = document.createElement('div');
                            flexRow.style.display = 'flex';
                            flexRow.style.alignItems = 'center';
                            flexRow.style.gap = '8px';
                            flexRow.appendChild(wrap.firstChild);
                            flexRow.appendChild(evButton);
                            
                            valElem.innerHTML = '';
                            valElem.appendChild(flexRow);
                            valElem.appendChild(evPanel);
                        }
                    }
                    
                    fieldElem.appendChild(nameElem);
                    fieldElem.appendChild(valElem);
                    fieldsContainer.appendChild(fieldElem);
                }

                headerElem.onclick = () => {
                    const chevron = headerElem.querySelector('.chevron');
                    if (fieldsContainer.style.display === 'none') {
                        fieldsContainer.style.display = 'block';
                        chevron.style.transform = 'rotate(0deg)';
                    } else {
                        fieldsContainer.style.display = 'none';
                        chevron.style.transform = 'rotate(-90deg)';
                    }
                };

                groupElem.appendChild(headerElem);
                groupElem.appendChild(fieldsContainer);
                groupsContainer.appendChild(groupElem);
            }
            
            updateStats(extractedCount, nullCount, totalCount);
        }
        
        function updateStats(ext = 0, nul = 0, tot = 0) {
            statExtracted.textContent = ext;
            statNull.textContent = nul;
            statTotal.textContent = tot;
        }

        document.getElementById('expandAllBtn').addEventListener('click', () => {
            document.querySelectorAll('.group-fields').forEach(el => el.style.display = 'block');
            document.querySelectorAll('.chevron').forEach(el => el.style.transform = 'rotate(0deg)');
        });
        
        document.getElementById('collapseAllBtn').addEventListener('click', () => {
            document.querySelectorAll('.group-fields').forEach(el => el.style.display = 'none');
            document.querySelectorAll('.chevron').forEach(el => el.style.transform = 'rotate(-90deg)');
        });

        downloadBtn.addEventListener('click', () => {
            if (!extractedMetadata) return;
            const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(extractedMetadata, null, 2));
            const downloadAnchorNode = document.createElement('a');
            downloadAnchorNode.setAttribute("href", dataStr);
            downloadAnchorNode.setAttribute("download", "extracted_metadata.json");
            document.body.appendChild(downloadAnchorNode);
            downloadAnchorNode.click();
            downloadAnchorNode.remove();
        });

        // Init
        init();
    </script>
</body>
</html>
